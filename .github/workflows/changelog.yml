name: Generate Mod Changelog

on:
  push:
    paths:
      - "changelogs/manifest.json"

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - run: pip install requests

      # 4️⃣ Run changelog generator
      - name: Generate changelog
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: python changelogs/generate_changelog.py

      # 5️⃣ Commit changes
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add changelogs/*.md
          git add changelogs/manifest_old.json || echo "No old manifest yet"
          git add changelogs/cf_cache.json || echo "No cache file"

          git commit -m "Update mod changelog" || echo "No changes to commit"
          git push
